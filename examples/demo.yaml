video:
  title: "大学回忆"
  resolution: [1280, 720]
  fps: 24
  background_color: "#181614"
  transition_duration: 0.8
  fade_duration: 0.6

scenes:
  - title: "大一"
    description: "故事从第一张合照慢慢开始。"
    duration: 5
    photos:
      - path: "photos/001.jpg"
        time: "2022.09"
        caption: "第一次班会"
        description: "那时候大家都还不熟，只记得教室外的光很好。"

  - title: "社团活动"
    description: "后来，名字和笑声都慢慢对上了。"
    duration: 6
    photos:
      - path: "photos/002.jpg"
        time: "2022.11"
        caption: "第一次参加社团活动"
      - path: "photos/003.jpg"
        time: "2023.04"
        caption: "操场边的傍晚"

  - title: "毕业前夜"
    description: "时间走得很轻，可回头看已经很远。"
    duration: 7
    photos:
      - path: "photos/004.jpg"
        time: "2026.06"
        caption: "聊到凌晨"
      - path: "photos/005.jpg"
        caption: "最后一次走过图书馆"
      - path: "photos/006.jpg"
        caption: "把夏天装进行李箱"
