<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Photo Memory Video</title>
    <link rel="stylesheet" href="/static/app.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark"></span>
          <div>
            <h1>大学回忆视频</h1>
            <p id="configPath"></p>
          </div>
        </div>
        <div class="top-actions">
          <input id="outputPath" class="path-input" aria-label="输出路径" />
          <button id="chooseOutputBtn">选择</button>
          <button id="saveBtn" class="primary">保存</button>
          <button id="previewBtn">预览</button>
          <button id="renderBtn">渲染</button>
        </div>
      </header>

      <section class="workspace">
        <aside class="scene-panel">
          <div class="panel-head">
            <h2>场景</h2>
            <button id="addSceneBtn" class="icon-btn" title="新增场景">+</button>
          </div>
          <div id="sceneList" class="scene-list"></div>
        </aside>

        <section class="editor-panel">
          <div class="video-grid">
            <label>
              片名
              <input id="videoTitle" />
            </label>
            <label>
              分辨率
              <div class="split-input">
                <input id="videoWidth" type="number" min="320" step="1" />
                <input id="videoHeight" type="number" min="180" step="1" />
              </div>
            </label>
            <label>
              帧率
              <input id="videoFps" type="number" min="1" step="1" />
            </label>
            <label>
              背景
              <input id="backgroundColor" type="color" />
            </label>
            <label>
              转场
              <input id="transitionDuration" type="number" min="0" step="0.1" />
            </label>
            <label>
              淡入淡出
              <input id="fadeDuration" type="number" min="0" step="0.1" />
            </label>
            <label class="toggle-field">
              整页缩放
              <input id="sceneZoom" type="checkbox" />
            </label>
          </div>

          <div id="sceneEditor" class="scene-editor"></div>
        </section>

        <aside class="preview-panel">
          <div class="panel-head preview-head">
            <h2>预览</h2>
            <div class="preview-actions">
              <button id="graphicEditorBtn" type="button">图形编辑</button>
              <span id="statusText" class="status-text">就绪</span>
            </div>
          </div>
          <div class="preview-frame">
            <img id="previewImage" alt="视频预览" />
          </div>
          <div id="progressBox" class="progress-box" hidden>
            <progress id="renderProgress" max="100" value="0"></progress>
            <div id="progressText">0%</div>
          </div>
          <a id="videoLink" class="video-link" target="_blank" rel="noreferrer"></a>
        </aside>
      </section>
    </main>

    <div id="graphicEditorModal" class="graphic-modal" hidden>
      <section class="graphic-dialog" role="dialog" aria-modal="true" aria-labelledby="graphicEditorTitle">
        <header class="graphic-dialog-head">
          <div>
            <h2 id="graphicEditorTitle">照片墙图形编辑</h2>
            <p id="graphicEditorPageLabel"></p>
          </div>
          <button id="graphicCloseBtn" type="button" class="icon-btn" aria-label="关闭">×</button>
        </header>

        <div class="graphic-toolbar">
          <button id="graphicBackBtn" type="button">置底</button>
          <button id="graphicFrontBtn" type="button">置顶</button>
          <label>
            适配
            <select id="graphicFitSelect">
              <option value="contain">完整</option>
              <option value="cover">裁切</option>
            </select>
          </label>
        </div>

        <div id="graphicEditorNotice" class="graphic-notice" hidden>
          <p>当前页不是照片墙布局。</p>
          <button id="switchPhotoWallBtn" type="button">切换到照片墙</button>
        </div>

        <div class="graphic-workspace">
          <div id="graphicEditorCanvas" class="graphic-canvas"></div>
        </div>

        <footer class="graphic-dialog-foot">
          <button id="graphicCancelBtn" type="button">取消</button>
          <button id="graphicApplyBtn" type="button" class="primary">应用</button>
        </footer>
      </section>
    </div>

    <script src="/static/app.js"></script>
  </body>
</html>
